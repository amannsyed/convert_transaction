services:
  - type: web
    name: bank-csv-converter
    runtime: python
    plan: free
    autoDeploy: true # Optional: Change to true for automatic redeploys on push
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Ensures Render uses a modern Python version
